name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: curl -s https://nexa-backend.onrender.com/api/
      - name: Ping Frontend
        run: curl -s https://nexaai.live
