name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Services Awake
        run: |
          curl -H "User-Agent: Mozilla/5.0 (NexaAI-KeepAlive)" -s https://nexa-backend.onrender.com/api/ > /dev/null
          curl -H "User-Agent: Mozilla/5.0 (NexaAI-KeepAlive)" -s https://nexaai.live/ > /dev/null
          echo "Pings sent at $(date)"
